# Static portfolio site. Content is generated from Notion at build time
# (pnpm fetch:notion) and served as static assets from dist/public.
# The project name is kept as the existing Cloudflare Pages project so deploys
# keep targeting namuori.net; the GitHub repo itself is NAMUORI00/yskim-portfolio.
name = "namuori-portfolio-cms"
pages_build_output_dir = "dist/public"
compatibility_date = "2026-05-18"

# KV cache for the Notion media proxy (functions/media/[id].js). Stores resolved
# fresh file URLs with a short TTL so the Notion API is queried at most once per
# media block per ~45 minutes, shared across all visitors. Only used when content
# is generated with NOTION_MEDIA_MODE=proxy; the default (download) self-hosts
# media at build time and needs no runtime function. Free tier covers this easily.
# The proxy function also needs the NOTION_TOKEN Pages secret at runtime.
[[kv_namespaces]]
binding = "MEDIA_CACHE"
id = "3d788373ca964d438fe66849bf09420f"
